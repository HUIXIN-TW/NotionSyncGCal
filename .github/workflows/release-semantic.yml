name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.31"

      - name: Run validation
        run: |
          uv sync --frozen --dev
          uv run black --check src lambda_function.py --line-length 120
          uv run flake8 --max-line-length=120 src lambda_function.py test
          uv run python -m unittest discover -s test
          ./scripts/check_no_plaintext_secrets.sh
          bash scripts/check_lambda_deploy_workflows.sh

      - name: Run semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email actions@users.noreply.github.com
          uv run semantic-release version --no-commit --no-changelog --vcs-release
