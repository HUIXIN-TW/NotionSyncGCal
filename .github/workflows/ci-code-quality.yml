name: Code Quality Checks

on: push

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Flake8
        run: pip install flake8

      - name: Check Python code quality with Flake8
        run: flake8 --max-line-length=120 .

      - name: Install Node.js for Prettier
        uses: actions/setup-node@v6
        with:
          node-version: "20" # Specify the Node.js version.

      - name: Install Prettier
        run: npm install --save-dev prettier

      - name: Check code formatting with Prettier
        run: npx prettier --check .

      - name: Block plaintext secrets in workflows
        run: ./scripts/check_no_plaintext_secrets.sh

      - name: Check Lambda deploy workflow guardrails
        run: ./scripts/check_lambda_deploy_workflows.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.5.31"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run tests with coverage
        run: |
          uv run coverage run -m unittest discover -s test -v
          uv run coverage report -m
