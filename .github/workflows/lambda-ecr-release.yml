name: Release Lambda Container Image

on:
  push:
    branches:
      - master

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ap-southeast-2
  ECR_ACCOUNT_ID: 262835400669
  DOCKER_FILE: Dockerfile
  IMAGE_NAME: notion-sync-gcal-lambda

jobs:
  release:
    name: Release & Push Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      - name: Pin checkout to workflow SHA
        run: git reset --hard "${{ github.sha }}"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.31"

      - name: Run validation
        run: |
          uv sync --frozen --dev
          uv run black --check src lambda_function.py --line-length 120
          uv run flake8 --max-line-length=120 src lambda_function.py test
          uv run python -m unittest discover -s test
          ./scripts/check_no_plaintext_secrets.sh
          bash scripts/check_lambda_deploy_workflows.sh

      - name: Run semantic release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name github-actions
          git config user.email actions@users.noreply.github.com
          uv run semantic-release version --no-changelog --vcs-release

      - name: Resolve image refs
        id: image-refs
        run: |
          if [[ "${{ steps.release.outputs.released }}" == "true" ]]; then
            release_tag="${{ steps.release.outputs.tag }}"

            if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid semantic-release tag: $release_tag"
              exit 1
            fi

            release_commit="${{ steps.release.outputs.commit_sha }}"
            short_sha="${release_commit:0:12}"
            echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          else
            short_sha="${GITHUB_SHA:0:12}"
            echo "release_tag=" >> "$GITHUB_OUTPUT"
          fi

          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout release commit
        if: steps.release.outputs.released == 'true'
        run: git checkout "${{ steps.release.outputs.commit_sha }}"

      - name: Configure AWS credentials for ECR push
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.PRD_DEPLOY_ROLE_ARN }}
          role-duration-seconds: 3500

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ env.ECR_ACCOUNT_ID }}

      - name: Prepare image tags
        id: image-tags
        run: |
          image_base="${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}"
          short_sha="${{ steps.image-refs.outputs.short_sha }}"
          release_tag="${{ steps.image-refs.outputs.release_tag }}"

          {
            echo "tags<<EOF"
            echo "$image_base:prod-$short_sha"
            echo "$image_base:sha-$short_sha"
            if [[ -n "$release_tag" ]]; then
              echo "$image_base:$release_tag"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & Push production image
        uses: docker/build-push-action@v6
        id: build-and-push
        with:
          context: .
          file: ${{ env.DOCKER_FILE }}
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.image-tags.outputs.tags }}
